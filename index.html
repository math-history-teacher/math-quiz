<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学 確認クイズ | 定期試験対策</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Yu Gothic', 'Hiragino Sans', sans-serif;
    background: #ffffff;
    color: #1a1a2e;
    min-height: 100vh;
  }
  .app { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* TOP */
  .top-header { text-align: center; padding: 44px 0 32px; }
  .top-header .logo { font-size: 11px; letter-spacing: 5px; color: #5060c8; text-transform: uppercase; margin-bottom: 14px; }
  .top-header h1 { font-size: 30px; font-weight: 700; color: #1a1a2e; line-height: 1.3; margin-bottom: 10px; }
  .top-header p { font-size: 14px; color: #888; }

  .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 24px 0; }
  .section-card {
    background: #f8f9fe; border: 1.5px solid #e0e3f5;
    border-radius: 14px; padding: 18px 20px;
    cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden;
    user-select: none;
  }
  .section-card:hover { border-color: #7080d8; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(80,96,200,0.1); }
  .section-card.selected { border-color: #5060c8; background: #eef0fb; }
  .section-card.selected::after {
    content: '✓'; position: absolute; top: 14px; right: 16px;
    font-size: 15px; color: #5060c8; font-weight: 700;
  }
  .section-card .tag { font-size: 10px; letter-spacing: 2px; color: #7080d0; text-transform: uppercase; margin-bottom: 8px; }
  .section-card h3 { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 5px; line-height: 1.4; }
  .section-card p { font-size: 11px; color: #999; line-height: 1.5; }
  .section-card .count { margin-top: 10px; font-size: 11px; color: #7080d0; }

  .start-btn {
    width: 100%; padding: 16px; font-size: 16px; font-weight: 700;
    background: linear-gradient(135deg, #4a5cc8, #7b8de6);
    color: #fff; border: none; border-radius: 12px;
    cursor: pointer; transition: all 0.2s; margin-top: 6px; letter-spacing: 1px;
    font-family: inherit;
  }
  .start-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(80,96,200,0.3); }
  .start-btn:disabled { background: #e8eaf5; color: #aab; cursor: not-allowed; transform: none; box-shadow: none; }

  .resume-box {
    background: #f4f5fd; border: 1px solid #dde0f0;
    border-radius: 12px; padding: 14px 18px;
    margin-bottom: 18px; display: flex;
    align-items: center; justify-content: space-between; gap: 12px;
  }
  .resume-box .info { font-size: 13px; color: #666; }
  .resume-box .info strong { color: #5060c8; }
  .resume-btn {
    padding: 8px 16px; font-size: 13px; font-weight: 600;
    background: #eef0fb; color: #5060c8;
    border: 1px solid #c8cce8; border-radius: 8px;
    cursor: pointer; white-space: nowrap; font-family: inherit;
    transition: background 0.15s;
  }
  .resume-btn:hover { background: #e0e4f8; }

  /* GRADE */
  .grade-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 24px 0; }
  .grade-card {
    background: #f8f9fe; border: 2px solid #e0e3f5;
    border-radius: 16px; padding: 22px 14px;
    cursor: pointer; transition: all 0.18s;
    text-align: center; user-select: none;
  }
  .grade-card:hover { border-color: #7080d8; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(80,96,200,0.12); }
  .grade-card.disabled {
    opacity: 0.45; cursor: not-allowed; pointer-events: none;
  }
  .grade-card .gc-badge {
    display: inline-block; font-size: 9px; letter-spacing: 1px;
    color: #fff; background: #bbb; border-radius: 4px;
    padding: 2px 7px; margin-bottom: 10px;
  }
  .grade-card.disabled .gc-badge { background: #ccc; }
  .grade-card:not(.disabled) .gc-badge { background: #5060c8; }
  .grade-card h2 { font-size: 17px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; line-height: 1.3; }
  .grade-card p { font-size: 11px; color: #999; line-height: 1.5; }

  /* BACK BTN */
  .back-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 7px 14px; font-size: 13px; font-weight: 600;
    background: #f8f9fe; color: #7080d0;
    border: 1px solid #e0e3f5; border-radius: 8px;
    cursor: pointer; margin-bottom: 4px; font-family: inherit;
    transition: all 0.15s;
  }
  .back-btn:hover { border-color: #7080d8; color: #5060c8; }

  /* QUIZ */
  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .progress-wrap { flex: 1; margin-right: 16px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 7px; }
  .progress-label span:first-child { color: #666; }
  .progress-bar { height: 3px; background: #e8eaf5; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #4a5cc8, #7b8de6); border-radius: 2px; transition: width 0.4s ease; }

  .timer-box { text-align: right; flex-shrink: 0; }
  .timer-val { font-size: 28px; font-weight: 700; color: #333; font-variant-numeric: tabular-nums; line-height: 1; }
  .timer-val.urgent { color: #cc4444; }
  .timer-label { font-size: 10px; color: #aaa; margin-top: 2px; }

  .section-tag { font-size: 10px; letter-spacing: 3px; color: #7080d0; text-transform: uppercase; margin-bottom: 10px; }

  .question-card {
    background: #f8f9fe; border: 1px solid #e0e3f5;
    border-radius: 18px; padding: 28px 28px 24px;
    margin-bottom: 20px;
  }
  .question-num { font-size: 11px; color: #aaa; margin-bottom: 10px; }
  .q-text { font-size: 17px; line-height: 1.85; color: #1a1a2e; font-weight: 400; white-space: pre-wrap; }
  .q-hint {
    margin-top: 16px; padding: 10px 14px;
    background: #eef2fc; border-left: 3px solid #7080d0;
    border-radius: 0 8px 8px 0;
    font-size: 12px; color: #5060a0; line-height: 1.6;
  }

  .show-answer-btn {
    width: 100%; padding: 15px; font-size: 15px; font-weight: 700;
    background: #eef0fb; color: #4a5cc8;
    border: 1.5px solid #c8cce8; border-radius: 12px;
    cursor: pointer; transition: all 0.18s; margin-bottom: 14px;
    font-family: inherit; letter-spacing: 0.5px;
  }
  .show-answer-btn:hover { background: #e0e4f8; border-color: #7080d8; }
  .show-answer-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .answer-panel {
    background: #f0f4fa; border: 1px solid #ccd5ea;
    border-radius: 14px; padding: 22px 24px; margin-bottom: 14px;
    display: none;
  }
  .answer-panel.visible { display: block; }
  .answer-panel .ap-label { font-size: 10px; letter-spacing: 3px; color: #7090b0; text-transform: uppercase; margin-bottom: 12px; }
  .answer-panel .ap-answer {
    font-size: 16px; font-weight: 700; color: #1a3a88;
    line-height: 2; margin-bottom: 16px;
    padding-bottom: 14px; border-bottom: 1px solid #ccd5ea;
    white-space: pre-wrap; word-break: break-word;
    font-family: 'Courier New', monospace;
    overflow-x: auto;
  }
  .answer-panel .ap-explain { font-size: 13.5px; color: #4466aa; line-height: 2; white-space: pre-wrap; word-break: break-word; font-family: 'Courier New', 'Osaka-Mono', monospace; letter-spacing: 0.02em; overflow-x: auto; }
  .ap-section-label { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; border-radius: 4px; margin-bottom: 4px; font-family: 'Noto Sans JP', sans-serif; }
  .ap-label-housin { background: #e8f0fb; color: #3355aa; border: 1px solid #b0c4e8; }
  .ap-label-shomei { background: #eaf5ee; color: #1a6a3a; border: 1px solid #a0d4b0; }
  .ap-label-kaitou { background: #fef5e8; color: #7a5000; border: 1px solid #e0c880; }
  .ap-block { margin-bottom: 8px; }

  .self-eval { display: none; margin-bottom: 14px; }
  .self-eval.visible { display: block; }
  .self-eval-label { font-size: 12px; color: #999; text-align: center; margin-bottom: 10px; }
  .eval-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .eval-btn {
    padding: 13px; font-size: 14px; font-weight: 700;
    border: 1.5px solid; border-radius: 10px;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .eval-btn.ok { background: #eaf6ef; border-color: #5aaa77; color: #1a7a3a; }
  .eval-btn.ok:hover { background: #d8f0e0; border-color: #3a9a66; }
  .eval-btn.ng { background: #fdf0f0; border-color: #dd8888; color: #cc3333; }
  .eval-btn.ng:hover { background: #fde0e0; border-color: #cc5555; }
  .eval-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .action-row { display: flex; gap: 10px; }
  .save-quit-btn {
    padding: 13px 18px; font-size: 13px; font-weight: 600;
    background: #f8f9fe; color: #aaa;
    border: 1px solid #e0e3f5; border-radius: 10px;
    cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap;
  }
  .save-quit-btn:hover { border-color: #7080d8; color: #5060c8; }
  .next-btn {
    flex: 1; padding: 13px; font-size: 15px; font-weight: 700;
    background: linear-gradient(135deg, #4a5cc8, #7b8de6);
    color: #fff; border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.15s; display: none; font-family: inherit;
  }
  .next-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(80,96,200,0.3); }

  /* RESULT */
  .result-header { text-align: center; padding: 44px 0 32px; }
  .result-score {
    font-size: 80px; font-weight: 800; line-height: 1;
    background: linear-gradient(135deg, #4a5cc8, #7b8de6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .result-label { font-size: 13px; color: #aaa; margin-top: 8px; }
  .result-msg { font-size: 18px; font-weight: 600; color: #1a1a2e; margin-top: 18px; }

  .result-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 28px 0; }
  .stat-card { background: #f8f9fe; border: 1px solid #e0e3f5; border-radius: 12px; padding: 16px; text-align: center; }
  .stat-card .sv { font-size: 26px; font-weight: 700; color: #5060c8; }
  .stat-card .sl { font-size: 11px; color: #aaa; margin-top: 5px; }

  .review-section-label { font-size: 12px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; margin: 8px 0 10px; }
  .review-item {
    background: #f8f9fe; border: 1px solid #e0e3f5; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 8px;
  }
  .review-item .ri-q { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 6px; }
  .review-item .ri-a { font-size: 12px; color: #5060a0; }
  .review-item.ng-item { border-left: 3px solid #dd8888; }

  .restart-btn {
    width: 100%; padding: 14px; font-size: 15px; font-weight: 700;
    background: #f8f9fe; color: #5060c8;
    border: 1px solid #dde0f0; border-radius: 12px;
    cursor: pointer; margin-top: 10px; transition: all 0.15s; font-family: inherit;
  }
  .restart-btn:hover { background: #eef0fb; }

  /* LOGIN */
  .login-wrap { text-align: center; padding: 56px 0 36px; }
  .login-wrap .logo { font-size: 11px; letter-spacing: 5px; color: #5060c8; text-transform: uppercase; margin-bottom: 14px; }
  .login-wrap h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
  .login-wrap > p { font-size: 14px; color: #888; margin-bottom: 36px; }
  .login-form { max-width: 320px; margin: 0 auto; }
  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: #5060c8; margin-bottom: 6px; letter-spacing: 1px; }
  .form-group input {
    width: 100%; padding: 12px 16px; font-size: 16px;
    border: 1.5px solid #e0e3f5; border-radius: 10px;
    background: #f8f9fe; color: #1a1a2e; font-family: inherit;
    transition: border-color 0.15s; outline: none;
  }
  .form-group input:focus { border-color: #5060c8; background: #fff; }
  .form-group .hint { font-size: 11px; color: #bbb; margin-top: 4px; }
  .login-error { font-size: 12px; color: #cc4444; margin-bottom: 10px; min-height: 18px; text-align: left; }

  /* SEND STATUS */
  .send-status { text-align: center; font-size: 13px; color: #7080d0; min-height: 22px; margin-bottom: 10px; }

  /* ── レスポンシブ（480px 以下） ─────────────────────── */
  @media (max-width: 480px) {
    .app { padding: 16px 12px 60px; }
    .top-header { padding: 30px 0 20px; }
    .top-header h1 { font-size: 22px; }
    .section-grid { grid-template-columns: 1fr; }
    .section-card { padding: 14px 16px; }
    .grade-grid { grid-template-columns: 1fr; }
    .grade-card { padding: 18px 14px; }
    .login-wrap { padding: 40px 0 28px; }
    .login-wrap h1 { font-size: 22px; }
    .login-form { max-width: 100%; }
    .quiz-header { flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .progress-wrap { width: 100%; margin-right: 0; }
    .timer-box { align-self: flex-end; margin-left: auto; }
    .timer-val { font-size: 22px; }
    .question-card { padding: 16px 14px; }
    .q-text { font-size: 15px; }
    .answer-panel { padding: 16px 14px; }
    .answer-panel .ap-answer { font-size: 14px; }
    .answer-panel .ap-explain { font-size: 12.5px; }
    .eval-btns { gap: 8px; }
    .eval-btn { padding: 14px 8px; font-size: 13px; }
    .action-row { flex-direction: column; gap: 8px; }
    .save-quit-btn { width: 100%; text-align: center; padding: 12px; }
    .next-btn { display: block; width: 100%; }
    .result-header { padding: 30px 0 20px; }
    .result-score { font-size: 56px; }
    .result-msg { font-size: 15px; }
    .result-stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-card { padding: 12px 8px; }
    .stat-card .sv { font-size: 20px; }
    .stat-card .sl { font-size: 10px; }
    .review-item { padding: 12px; }
    .review-item .ri-q { font-size: 12px; }
    .review-item .ri-a { font-size: 11px; }
  }

  /* KaTeX */
  .katex { font-size: 1em; }
  .katex-display { margin: 0.3em 0; overflow-x: auto; }
  .ap-explain .katex { font-size: 0.95em; }
</style>
</head>
<body>
<div class="app">

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="logo">数学 定期試験対策</div>
    <h1>確認クイズ</h1>
    <p>出席番号を入力してスタートしよう</p>
    <div class="login-form">
      <div class="form-group">
        <label>出席番号 <span style="color:#cc4444">*</span></label>
        <input type="text" id="input-student-id" inputmode="numeric" maxlength="4"
               placeholder="例：5102（5年1組2番）"
               oninput="previewStudentId()"
               onkeydown="if(event.key==='Enter')login()" />
        <div class="hint">学年・組・番号の順に4桁で入力（例：5102 → 5年1組2番）</div>
        <div id="student-id-preview" style="margin-top:6px;font-size:13px;font-weight:600;min-height:20px;transition:color 0.15s;"></div>
      </div>
      <div class="form-group">
        <label>名前（任意）</label>
        <input type="text" id="input-student-name" placeholder="省略可" maxlength="20"
               onkeydown="if(event.key==='Enter')login()" />
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="start-btn" onclick="login()">スタート →</button>
    </div>
  </div>
</div>

<!-- GRADE SELECT -->
<div id="screen-grade" class="screen">
  <div class="top-header">
    <div class="logo">数学 定期試験対策</div>
    <h1>学年を選択</h1>
    <p id="grade-student-label">あなたの学年を選んでください</p>
  </div>
  <div class="grade-grid" id="grade-grid"></div>
  <button class="restart-btn" onclick="showScreen('login')">← ログインに戻る</button>
</div>

<!-- TOP -->
<div id="screen-top" class="screen">
  <button class="back-btn" onclick="goGrade()">← 学年選択に戻る</button>
  <div class="top-header">
    <div class="logo" id="top-logo">数学 定期試験対策</div>
    <h1 id="top-title">確認クイズ</h1>
    <p>単元を選んで、ノートで解いて、答え合わせしよう</p>
  </div>
  <div id="resume-area"></div>
  <div class="section-grid" id="section-grid"></div>
  <button class="start-btn" id="start-btn" disabled onclick="startQuiz()">選択した単元でスタート →</button>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progress-text">問題 1 / 10</span>
        <span id="eval-text"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="timer-box">
      <div class="timer-val" id="timer-val">—</div>
      <div class="timer-label">秒</div>
    </div>
  </div>

  <div class="section-tag" id="q-section"></div>

  <div class="question-card">
    <div class="question-num" id="q-num"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-hint" id="q-hint" style="display:none"></div>
  </div>

  <button class="show-answer-btn" id="show-answer-btn" onclick="showAnswer()">
    📖 解答を見る
  </button>

  <div class="answer-panel" id="answer-panel">
    <div class="ap-label">解答・解説</div>
    <div class="ap-answer" id="ap-answer"></div>
    <div class="ap-explain" id="ap-explain"></div>
  </div>

  <div class="self-eval" id="self-eval">
    <div class="self-eval-label">自己採点 — どちらでしたか？</div>
    <div class="eval-btns">
      <button class="eval-btn ok" onclick="evalAnswer(true)">⭕ 正解！</button>
      <button class="eval-btn ng" onclick="evalAnswer(false)">✕ 間違えた</button>
    </div>
  </div>

  <div class="action-row">
    <button class="save-quit-btn" onclick="saveAndQuit()">💾 保存して終了</button>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="result-header">
    <div class="result-score" id="result-score">0点</div>
    <div class="result-label">/ 100点（自己採点）</div>
    <div class="result-msg" id="result-msg"></div>
  </div>
  <div class="result-stats">
    <div class="stat-card"><div class="sv" id="s-ok">0</div><div class="sl">⭕ 正解</div></div>
    <div class="stat-card"><div class="sv" id="s-total">0</div><div class="sl">全問題数</div></div>
    <div class="stat-card"><div class="sv" id="s-time">0分</div><div class="sl">所要時間</div></div>
  </div>
  <div class="review-section-label">要復習リスト</div>
  <div id="review-list"></div>
  <div class="send-status" id="send-status"></div>
  <button class="restart-btn" onclick="goTop()">← 単元選択に戻る</button>
</div>

</div>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz2ibmRr52ieRLVnEzCQPwakQS99z-vCnzoPcik-059-hGskZligAcoxFGhenzh8RGT/exec';

// ── 学年・単元データ ──────────────────────────────────
const GRADE_DATA = [
  {
    id: 'grade3',
    name: '中学3年',
    subtitle: '平方根 確認クイズ',
    tag: '中3数学 定期試験対策',
    disabled: false,
    sections: [
      {
        id: 'square_root_basics', tag: '中学3年 第2章', name: '平方根の基礎', desc: '平方根の意味と大小関係',
        questions: [
          {

// ── 状態変数 ──────────────────────────────────────────
let currentGradeId = null;
let state = { selectedIds:[], questions:[], current:0, okCount:0, startTime:0, results:[] };
let timerInterval = null;
let timeLeft = 0;
let answerShown = false;

// ── ユーティリティ ────────────────────────────────────
function getStoreKey() { return 'math_quiz_' + (currentGradeId || 'default'); }

function getCurrentGrade() {
  return GRADE_DATA.find(function(g) { return g.id === currentGradeId; }) || null;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── 学年選択 ──────────────────────────────────────────
function buildGradePage() {
  var parsed = parseStudentId(sessionStorage.getItem('studentId') || '');
  var lbl = document.getElementById('grade-student-label');
  if (parsed) {
    lbl.textContent = parsed.label + ' — 学年を選んでください';
  } else {
    lbl.textContent = '学年を選んでください';
  }

  var grid = document.getElementById('grade-grid');
  grid.innerHTML = '';
  GRADE_DATA.forEach(function(g) {
    var card = document.createElement('div');
    card.className = 'grade-card' + (g.disabled ? ' disabled' : '');
    card.innerHTML =
      '<div class="gc-badge">' + (g.disabled ? '準備中' : '受講可') + '</div>' +
      '<h2>' + g.name + '</h2>' +
      '<p>' + g.subtitle + '</p>';
    if (!g.disabled) {
      card.onclick = function() { selectGrade(g.id); };
    }
    grid.appendChild(card);
  });
}

function selectGrade(id) {
  currentGradeId = id;
  var g = getCurrentGrade();
  document.getElementById('top-logo').textContent = g.tag || '数学 定期試験対策';
  document.getElementById('top-title').textContent = g.subtitle || '確認クイズ';
  state.selectedIds = [];
  showScreen('top');
  buildTopPage();
}

function goGrade() {
  stopTimer();
  state.selectedIds = [];
  showScreen('grade');
  buildGradePage();
}

// ── 単元選択 ──────────────────────────────────────────
function buildTopPage() {
  var g = getCurrentGrade();
  var sections = g ? g.sections : [];
  var grid = document.getElementById('section-grid');
  grid.innerHTML = '';

  if (sections.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:32px;color:#aaa;font-size:14px;">この学年の問題は準備中です。</div>';
    document.getElementById('start-btn').disabled = true;
    document.getElementById('resume-area').innerHTML = '';
    return;
  }

  sections.forEach(function(sec) {
    var card = document.createElement('div');
    card.className = 'section-card';
    card.id = 'card-' + sec.id;
    card.innerHTML = '<div class="tag">' + sec.tag + '</div><h3>' + sec.name + '</h3><p>' + sec.desc + '</p><div class="count">' + sec.questions.length + '問</div>';
    card.onclick = function() { toggleSection(sec.id); };
    grid.appendChild(card);
  });

  var saved = loadSave();
  var ra = document.getElementById('resume-area');
  if (saved) {
    ra.innerHTML = '<div class="resume-box"><div class="info">保存データあり：<strong>' + saved.questions.length + '問中 ' + saved.current + '問完了</strong>（⭕ ' + saved.okCount + '問）</div><button class="resume-btn" onclick="resumeQuiz()">▶ 再開する</button></div>';
  } else {
    ra.innerHTML = '';
  }
  document.getElementById('start-btn').disabled = state.selectedIds.length === 0;
}

function toggleSection(id) {
  var idx = state.selectedIds.indexOf(id);
  if (idx >= 0) state.selectedIds.splice(idx, 1); else state.selectedIds.push(id);
  document.querySelectorAll('.section-card').forEach(function(c) { c.classList.remove('selected'); });
  state.selectedIds.forEach(function(sid) { var el = document.getElementById('card-'+sid); if(el) el.classList.add('selected'); });
  document.getElementById('start-btn').disabled = state.selectedIds.length === 0;
}

function goTop() { stopTimer(); state.selectedIds = []; showScreen('top'); buildTopPage(); }

// ── クイズ ────────────────────────────────────────────
function startQuiz() {
  var g = getCurrentGrade();
  var sections = g ? g.sections : [];
  var qs = [];
  sections.forEach(function(sec) {
    if (state.selectedIds.includes(sec.id))
      qs = qs.concat(sec.questions.map(function(q) { return Object.assign({}, q, {section: sec.name}); }));
  });
  qs = shuffle(qs);
  state.questions = qs; state.current = 0; state.okCount = 0; state.startTime = Date.now(); state.results = [];
  showScreen('quiz'); renderQuestion();
}

function resumeQuiz() {
  var saved = loadSave(); if (!saved) return;
  state = Object.assign({}, saved); showScreen('quiz'); renderQuestion();
}

function renderQuestion() {
  var q = state.questions[state.current];
  if (!q) { clearSave(); showResult(); return; }
  answerShown = false;
  document.getElementById('q-section').textContent = q.section || '';
  document.getElementById('q-num').textContent = 'Q' + (state.current+1);
  renderText(document.getElementById('q-text'), q.text);
  var hintEl = document.getElementById('q-hint');
  if (q.hint) { renderText(hintEl, 'ヒント：' + q.hint); hintEl.style.display = 'block'; } else hintEl.style.display = 'none';
  renderText(document.getElementById('ap-answer'), q.answer);
  renderExplain(document.getElementById('ap-explain'), q.explain);
  document.getElementById('answer-panel').classList.remove('visible');
  document.getElementById('self-eval').classList.remove('visible');
  document.getElementById('self-eval').style.opacity = '1';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('show-answer-btn').disabled = false;
  document.querySelectorAll('.eval-btn').forEach(function(b) { b.disabled = false; });
  var total = state.questions.length, cur = state.current;
  document.getElementById('progress-text').textContent = '問題 ' + (cur+1) + ' / ' + total;
  var okC = state.results.filter(function(r) { return r; }).length;
  var ngC = state.results.filter(function(r) { return r === false; }).length;
  document.getElementById('eval-text').textContent = state.results.length > 0 ? '⭕'+okC+' ✕'+ngC : '';
  document.getElementById('progress-fill').style.width = (cur/total*100) + '%';
  startTimer(q.time);
}

function showAnswer() {
  if (answerShown) return;
  answerShown = true; stopTimer();
  document.getElementById('show-answer-btn').disabled = true;
  document.getElementById('answer-panel').classList.add('visible');
  document.getElementById('self-eval').classList.add('visible');
  document.getElementById('timer-val').textContent = '—';
  document.getElementById('timer-val').classList.remove('urgent');
}

function evalAnswer(isOk) {
  if (isOk) state.okCount++;
  state.results.push(isOk);
  document.querySelectorAll('.eval-btn').forEach(function(b) { b.disabled = true; });
  document.getElementById('self-eval').style.opacity = '0.5';
  document.getElementById('next-btn').style.display = 'block';
  saveProgress();
}

function nextQuestion() {
  state.current++;
  if (state.current >= state.questions.length) { clearSave(); showResult(); }
  else renderQuestion();
}

function startTimer(seconds) {
  stopTimer(); timeLeft = seconds; updateTimerUI(timeLeft);
  timerInterval = setInterval(function() { timeLeft--; updateTimerUI(timeLeft); if (timeLeft <= 0) stopTimer(); }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function updateTimerUI(left) {
  var el = document.getElementById('timer-val'); if (!el) return;
  el.textContent = Math.max(0, left);
  if (left <= 10) el.classList.add('urgent'); else el.classList.remove('urgent');
}

function saveProgress() {
  localStorage.setItem(getStoreKey(), JSON.stringify({questions:state.questions, current:state.current+1, okCount:state.okCount, startTime:state.startTime, results:state.results}));
}
function saveAndQuit() { saveProgress(); stopTimer(); goTop(); }
function loadSave() {
  try { var d = localStorage.getItem(getStoreKey()); if (!d) return null; var p = JSON.parse(d); if (!p || !p.questions || p.current >= p.questions.length) { clearSave(); return null; } return p; } catch(e) { return null; }
}
function clearSave() { localStorage.removeItem(getStoreKey()); }

// ── 結果 ──────────────────────────────────────────────
function showResult() {
  stopTimer(); showScreen('result');
  var total = state.results.length, ok = state.results.filter(function(r) { return r; }).length;
  var scoreVal = total > 0 ? Math.round(ok/total*100) : 0;
  var elapsed = Math.round((Date.now() - state.startTime) / 60000);
  document.getElementById('send-status').textContent = '';
  sendResult(scoreVal, ok, total);
  document.getElementById('result-score').textContent = scoreVal + '点';
  document.getElementById('s-ok').textContent = ok;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-time').textContent = elapsed + '分';
  var msgs = ['もう少し練習しよう！', 'いい調子！継続あるのみ！', 'よくできました！', '完璧です！'];
  document.getElementById('result-msg').textContent = msgs[scoreVal>=90?3:scoreVal>=70?2:scoreVal>=50?1:0];
  var rl = document.getElementById('review-list');
  var ngItems = state.results.map(function(r,i) { return {r:r, i:i}; }).filter(function(x) { return x.r === false; });
  if (ok === total && total > 0) {
    rl.innerHTML = '<div style="text-align:center;color:#3a9a55;padding:24px;font-size:15px">🎉 全問正解！素晴らしい！</div>';
  } else {
    rl.innerHTML = ngItems.map(function(x) { return '<div class="review-item ng-item"><div class="ri-q" id="ri-q-'+x.i+'"></div><div class="ri-a" id="ri-a-'+x.i+'"></div></div>'; }).join('');
  }
  document.querySelectorAll('[id^="ri-q-"]').forEach(function(el) {
    var idx = parseInt(el.id.replace('ri-q-', ''));
    renderText(el, 'Q'+(idx+1)+'　'+state.questions[idx].text);
  });
  document.querySelectorAll('[id^="ri-a-"]').forEach(function(el) {
    var idx = parseInt(el.id.replace('ri-a-', ''));
    renderText(el, '模範解答：' + state.questions[idx].answer);
  });
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}

// ── KaTeX レンダリング ────────────────────────────────
function renderMathLine(container, text) {
  container.innerHTML = '';
  if (!text || text.trim() === '') return;
  var parts = text.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]+?\$)/g);
  parts.forEach(function(part) {
    if (!part) return;
    if (part.startsWith('$$') && part.endsWith('$$')) {
      var math = part.slice(2, -2);
      var span = document.createElement('span');
      try { span.innerHTML = katex.renderToString(math, {throwOnError:false, displayMode:true}); } catch(e) { span.textContent = part; }
      container.appendChild(span);
    } else if (part.startsWith('$') && part.endsWith('$') && part.length > 2) {
      var math = part.slice(1, -1);
      var span = document.createElement('span');
      try { span.innerHTML = katex.renderToString(math, {throwOnError:false, displayMode:false}); } catch(e) { span.textContent = part; }
      container.appendChild(span);
    } else {
      container.appendChild(document.createTextNode(part));
    }
  });
}

function renderText(el, text) {
  el.innerHTML = '';
  var lines = text.split('\n');
  lines.forEach(function(line) {
    var div = document.createElement('div');
    div.style.cssText = 'line-height:1.9; min-height:' + (line.trim() === '' ? '0.6' : '1.4') + 'em;';
    renderMathLine(div, line);
    el.appendChild(div);
  });
}

function renderExplain(el, text) {
  el.innerHTML = '';
  var lines = text.split('\n');
  var buffer = [];

  function flushBuffer() {
    if (buffer.length === 0) return;
    var div = document.createElement('div');
    div.style.cssText = 'margin-bottom:2px;';
    buffer.forEach(function(line) {
      var row = document.createElement('div');
      row.style.cssText = 'line-height:2; min-height:' + (line.trim() === '' ? '0.6' : '1.2') + 'em; font-family: "Courier New", monospace; font-size:13.5px;';
      renderMathLine(row, line);
      div.appendChild(row);
    });
    el.appendChild(div);
    buffer = [];
  }

  lines.forEach(function(line) {
    if (line === '【方針】' || line === '【証明】' || line === '【解法】') {
      flushBuffer();
      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'margin: 10px 0 6px;';
      var lbl = document.createElement('span');
      var cls = 'ap-section-label ';
      if (line === '【方針】') cls += 'ap-label-housin';
      else if (line === '【解法】') cls += 'ap-label-kaitou';
      else cls += 'ap-label-shomei';
      lbl.className = cls;
      lbl.textContent = line;
      wrapper.appendChild(lbl);
      el.appendChild(wrapper);
    } else {
      buffer.push(line);
    }
  });
  flushBuffer();
}

// ── 出席番号パーサー ──────────────────────────────────
var GRADE_LABELS = ['', '1年（中1）', '2年（中2）', '3年（中3）', '4年（高1）', '5年（高2）', '6年（高3）'];

function parseStudentId(code) {
  var s = String(code).trim();
  if (!/^\d{4}$/.test(s)) return null;
  var grade = parseInt(s[0], 10);
  var cls   = parseInt(s[1], 10);
  var num   = parseInt(s.slice(2), 10);
  if (grade < 1 || grade > 6) return null;
  if (cls   < 1 || cls   > 9) return null;
  if (num   < 1 || num   > 40) return null;
  return { grade:grade, cls:cls, num:num, label: GRADE_LABELS[grade]+' '+cls+'組 '+num+'番' };
}

function previewStudentId() {
  var val = document.getElementById('input-student-id').value.trim();
  var el  = document.getElementById('student-id-preview');
  if (val.length === 0) { el.textContent = ''; return; }
  var parsed = parseStudentId(val);
  if (parsed) {
    el.textContent = '→ ' + parsed.label;
    el.style.color = '#5060c8';
  } else if (val.length === 4) {
    var g = parseInt(val[0], 10), c = parseInt(val[1], 10), n = parseInt(val.slice(2), 10);
    if (g < 1 || g > 6)  el.textContent = '1桁目（学年）は 1〜6 で入力してください';
    else if (c < 1 || c > 9) el.textContent = '2桁目（組）は 1〜9 で入力してください';
    else                  el.textContent = '3・4桁目（番号）は 01〜40 で入力してください';
    el.style.color = '#cc4444';
  } else {
    el.textContent = '';
  }
}

// ── ログイン ──────────────────────────────────────────
function login() {
  var idVal   = document.getElementById('input-student-id').value.trim();
  var nameVal = document.getElementById('input-student-name').value.trim();
  var errEl   = document.getElementById('login-error');
  var parsed  = parseStudentId(idVal);
  if (!parsed) {
    var msg = '';
    if (!/^\d{4}$/.test(idVal)) {
      msg = '4桁の数字で入力してください（例：5102）。';
    } else {
      var g = parseInt(idVal[0], 10), c = parseInt(idVal[1], 10), n = parseInt(idVal.slice(2), 10);
      if (g < 1 || g > 6)  msg = '1桁目（学年）は 1〜6 で入力してください。';
      else if (c < 1 || c > 9) msg = '2桁目（組）は 1〜9 で入力してください。';
      else                  msg = '3・4桁目（番号）は 01〜40 で入力してください。';
    }
    errEl.textContent = msg;
    document.getElementById('input-student-id').focus();
    return;
  }
  errEl.textContent = '';
  sessionStorage.setItem('studentId', idVal);
  sessionStorage.setItem('studentName', nameVal);
  showScreen('grade');
  buildGradePage();
}

// ── GAS 送信 ─────────────────────────────────────────
function sendResult(scoreVal, ok, total) {
  if (!GAS_URL || GAS_URL === 'ここにGASのURLを貼る') return;
  var statusEl = document.getElementById('send-status');
  statusEl.textContent = '📤 記録を送信中...';
  var g = getCurrentGrade();
  var payload = {
    studentId: sessionStorage.getItem('studentId') || '',
    studentName: sessionStorage.getItem('studentName') || '',
    timestamp: new Date().toISOString(),
    grade: currentGradeId || '',
    gradeName: g ? g.name : '',
    sections: state.selectedIds,
    totalQuestions: total,
    correctCount: ok,
    scorePercent: scoreVal,
    details: state.results.map(function(r, i) {
      return {
        section: state.questions[i] ? state.questions[i].section : '',
        questionText: state.questions[i] ? state.questions[i].text : '',
        correct: r
      };
    })
  };
  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function() {
    setTimeout(function() { statusEl.textContent = '✅ 記録しました'; }, 2000);
  }).catch(function() {
    statusEl.textContent = '';
  });
}
